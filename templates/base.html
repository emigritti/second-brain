<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Second Brain{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        <a href="/" class="site-title" aria-label="Second Brain — home">
            <span class="title-bracket">[</span>SECOND BRAIN<span class="title-bracket">]</span>
        </a>

        <button class="nav-toggle"
                aria-label="Toggle navigation"
                aria-expanded="false"
                aria-controls="main-nav">
            <span></span><span></span><span></span>
        </button>

        <nav id="main-nav" role="navigation" aria-label="Main navigation">
            <a href="/"
               {% if request.url.path == '/' %}aria-current="page"{% endif %}>
                [TERMINAL]
            </a>
            <a href="/graph"
               {% if request.url.path == '/graph' %}aria-current="page"{% endif %}>
                [GRAPH]
            </a>
            <a href="/upload"
               {% if request.url.path == '/upload' %}aria-current="page"{% endif %}>
                [UPLOAD]
            </a>
            <a href="/settings"
               {% if request.url.path == '/settings' %}aria-current="page"{% endif %}>
                [SETTINGS]
            </a>
        </nav>
    </header>

    <main id="main-content"
          role="main"
          tabindex="-1"
          {% block main_attrs %}{% endblock %}>
        {% block content %}{% endblock %}
    </main>

    <script>
    (function () {
        var toggle = document.querySelector('.nav-toggle');
        var nav    = document.getElementById('main-nav');
        if (!toggle || !nav) return;

        toggle.addEventListener('click', function () {
            var open = nav.classList.toggle('open');
            toggle.setAttribute('aria-expanded', String(open));
        });

        document.addEventListener('click', function (e) {
            if (!nav.classList.contains('open')) return;
            if (!toggle.contains(e.target) && !nav.contains(e.target)) {
                nav.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
            }
        });

        // Close nav on Escape
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && nav.classList.contains('open')) {
                nav.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.focus();
            }
        });
    })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
