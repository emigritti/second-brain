{% extends "base.html" %}

{% block title %}Upload — Second Brain{% endblock %}

{% block content %}
<h2 class="upload-header">[ UPLOAD DOCUMENT ]</h2>

<div class="drop-zone"
     id="drop-zone"
     role="button"
     tabindex="0"
     aria-label="Upload document. Click or drag and drop a file here."
     aria-describedby="drop-zone-hint">
    <div class="drop-zone-icon" aria-hidden="true">[ FILE ]</div>
    <div id="drop-zone-hint">DRAG &amp; DROP FILE HERE</div>
    <div class="drop-zone-sub">PDF · DOCX · XLSX · PPTX · HTML · EPUB · MD · CSV · MP3 · ZIP</div>
    <input type="file"
           id="file-input"
           name="file"
           accept=".pdf,.docx,.xlsx,.xls,.pptx,.html,.htm,.xml,.csv,.json,.epub,.md,.mp3,.wav,.m4a,.zip"
           aria-label="Select a document file"
           style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;">
</div>

<div class="upload-progress-wrap" id="upload-progress-wrap" aria-hidden="true">
    <div class="upload-progress-label" id="upload-progress-label">UPLOADING...</div>
    <div class="upload-progress-track">
        <div class="upload-progress-fill"
             id="upload-progress-fill"
             role="progressbar"
             aria-valuenow="0"
             aria-valuemin="0"
             aria-valuemax="100"
             aria-label="Upload progress"></div>
    </div>
</div>

<div id="upload-status"
     class="upload-status"
     role="status"
     aria-live="polite"
     aria-atomic="true"></div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  'use strict';

  document.addEventListener('DOMContentLoaded', function () {
    var dropZone    = document.getElementById('drop-zone');
    var fileInput   = document.getElementById('file-input');
    var statusEl    = document.getElementById('upload-status');
    var progressWrap = document.getElementById('upload-progress-wrap');
    var progressFill = document.getElementById('upload-progress-fill');
    var progressLabel = document.getElementById('upload-progress-label');

    // Drag and drop
    dropZone.addEventListener('dragover', function (e) {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', function (e) {
      if (!dropZone.contains(e.relatedTarget)) {
        dropZone.classList.remove('dragover');
      }
    });

    dropZone.addEventListener('drop', function (e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', function () {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'upload-status' + (type ? ' ' + type : '');
    }

    function setProgress(pct, label) {
      progressFill.style.width = pct + '%';
      progressFill.setAttribute('aria-valuenow', pct);
      if (label) progressLabel.textContent = label;
    }

    var ACCEPTED_EXTENSIONS = new Set([
      '.pdf','.docx','.xlsx','.xls','.pptx',
      '.html','.htm','.xml','.csv','.json',
      '.epub','.md','.mp3','.wav','.m4a','.zip'
    ]);

    function hideProgress(delay, clearInput) {
      setTimeout(function () {
        progressWrap.classList.remove('visible');
        progressWrap.setAttribute('aria-hidden', 'true');
        if (clearInput) fileInput.value = '';
        setProgress(0, 'UPLOADING...');
      }, delay);
    }

    async function handleFile(file) {
      var ext = file.name.slice(file.name.lastIndexOf('.')).toLowerCase();
      if (!ACCEPTED_EXTENSIONS.has(ext)) {
        setStatus('ERROR: UNSUPPORTED FILE TYPE (' + (ext || 'unknown') + ').', 'error');
        return;
      }

      setStatus('', '');
      progressWrap.classList.add('visible');
      progressWrap.removeAttribute('aria-hidden');
      setProgress(15, 'UPLOADING...');

      var formData = new FormData();
      formData.append('file', file);

      try {
        setProgress(40, 'TRANSFERRING...');
        var response = await fetch('/upload', { method: 'POST', body: formData });
        setProgress(80, 'PROCESSING...');

        var data = await response.json();
        setProgress(100, 'COMPLETE');

        if (response.ok) {
          setStatus('SUCCESS: ' + (data.status || 'Ingestion started.'), 'success');
          hideProgress(4000, true);
        } else {
          setStatus('ERROR: ' + (data.message || 'Upload failed.'), 'error');
          hideProgress(2000, false);
        }
      } catch (err) {
        setStatus('ERROR: ' + err.message, 'error');
        hideProgress(2000, false);
      }
    }
  });
})();
</script>
{% endblock %}
