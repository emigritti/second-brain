{% extends "base.html" %}

{% block title %}Upload — Second Brain{% endblock %}

{% block content %}
<h2 class="upload-header">[ UPLOAD DOCUMENT ]</h2>

<div class="drop-zone"
     id="drop-zone"
     role="button"
     tabindex="0"
     aria-label="Upload PDF. Click or drag and drop a file here."
     aria-describedby="drop-zone-hint">
    <div class="drop-zone-icon" aria-hidden="true">[ PDF ]</div>
    <div id="drop-zone-hint">DRAG &amp; DROP PDF HERE</div>
    <div class="drop-zone-sub">or click / press Space to browse</div>
    <input type="file"
           id="file-input"
           name="file"
           accept=".pdf"
           aria-label="Select a PDF file"
           style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;">
</div>

<div class="upload-progress-wrap" id="upload-progress-wrap" aria-hidden="true">
    <div class="upload-progress-label" id="upload-progress-label">UPLOADING...</div>
    <div class="upload-progress-track">
        <div class="upload-progress-fill"
             id="upload-progress-fill"
             role="progressbar"
             aria-valuenow="0"
             aria-valuemin="0"
             aria-valuemax="100"
             aria-label="Upload progress"></div>
    </div>
</div>

<div id="upload-status"
     class="upload-status"
     role="status"
     aria-live="polite"
     aria-atomic="true"></div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  'use strict';

  document.addEventListener('DOMContentLoaded', function () {
    var dropZone    = document.getElementById('drop-zone');
    var fileInput   = document.getElementById('file-input');
    var statusEl    = document.getElementById('upload-status');
    var progressWrap = document.getElementById('upload-progress-wrap');
    var progressFill = document.getElementById('upload-progress-fill');
    var progressLabel = document.getElementById('upload-progress-label');

    // Drag and drop
    dropZone.addEventListener('dragover', function (e) {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', function (e) {
      if (!dropZone.contains(e.relatedTarget)) {
        dropZone.classList.remove('dragover');
      }
    });

    dropZone.addEventListener('drop', function (e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', function () {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'upload-status' + (type ? ' ' + type : '');
    }

    function setProgress(pct, label) {
      progressFill.style.width = pct + '%';
      progressFill.setAttribute('aria-valuenow', pct);
      if (label) progressLabel.textContent = label;
    }

    async function handleFile(file) {
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        setStatus('ERROR: ONLY PDF FILES ARE ACCEPTED.', 'error');
        return;
      }

      setStatus('', '');
      progressWrap.classList.add('visible');
      progressWrap.removeAttribute('aria-hidden');
      setProgress(15, 'UPLOADING...');

      var formData = new FormData();
      formData.append('file', file);

      try {
        setProgress(40, 'TRANSFERRING...');
        var response = await fetch('/upload', { method: 'POST', body: formData });
        setProgress(80, 'PROCESSING...');

        var data = await response.json();
        setProgress(100, 'COMPLETE');

        if (response.ok) {
          setStatus('SUCCESS: ' + (data.status || 'Ingestion started.'), 'success');
        } else {
          setStatus('ERROR: ' + (data.message || 'Upload failed.'), 'error');
          resetProgress();
        }
      } catch (err) {
        setStatus('ERROR: ' + err.message, 'error');
        resetProgress();
      }

      setTimeout(function () {
        progressWrap.classList.remove('visible');
        progressWrap.setAttribute('aria-hidden', 'true');
        fileInput.value = '';
        setProgress(0, 'UPLOADING...');
      }, 4000);
    }

    function resetProgress() {
      setTimeout(function () {
        progressWrap.classList.remove('visible');
        progressWrap.setAttribute('aria-hidden', 'true');
        setProgress(0, 'UPLOADING...');
      }, 2000);
    }
  });
})();
</script>
{% endblock %}
