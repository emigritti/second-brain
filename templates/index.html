{% extends "base.html" %}

{% block title %}Terminal — Second Brain{% endblock %}

{% block content %}
<div id="output"
     class="terminal-output"
     role="log"
     aria-live="polite"
     aria-label="Query output"
     aria-atomic="false">
<div class="terminal-welcome">SECOND BRAIN v1.0 — LOCAL KNOWLEDGE BASE READY
TYPE A QUESTION AND PRESS ENTER.</div>
</div>

<form class="terminal-input-wrap"
      id="query-form"
      role="search"
      aria-label="Query the knowledge base"
      onsubmit="return false;">
    <label for="query-input" class="prompt-label" aria-hidden="true">brain:~$</label>
    <input type="text"
           id="query-input"
           class="terminal-input"
           name="query"
           autocomplete="off"
           autocorrect="off"
           autocapitalize="off"
           spellcheck="false"
           autofocus
           aria-label="Enter your query">
    <span class="cursor" aria-hidden="true"></span>
</form>

<p class="keyboard-hint" aria-hidden="true">
    <kbd>↑</kbd> <kbd>↓</kbd> history &nbsp;&middot;&nbsp;
    <kbd>Esc</kbd> clear &nbsp;&middot;&nbsp;
    <kbd>Enter</kbd> submit
</p>
{% endblock %}

{% block scripts %}
<script src="/static/terminal.js"></script>
{% endblock %}
